name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Grant the workflow token write access so it can commit the SVGs
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ISHANT57
          outputs: |
            images/github-contribution-grid-snake.svg
            images/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit snake SVGs to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update contribution snake [skip ci]"
          file_pattern: images/*.svg
          branch: main
