name: Update Profile Stats

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  # Allows manual runs from the Actions tab
  workflow_dispatch:
  # Run on pushes to main (a GITHUB_TOKEN push won't re-trigger this)
  push:
    branches: ["main"]

# Needed so the action can commit the updated SVGs + cache back to the repo
permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dateutil lxml

      - name: Generate profile stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ISHANT57
        run: python today.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg cache
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update profile stats [skip ci]"
            git push
          fi
